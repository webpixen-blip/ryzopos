<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Boxicons for modern icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/marketplace.css">
</head>
<body>
    <div class="marketplace-wrapper">
        <header class="store-header" id="store-header">
            <div class="header-content">
                <div class="store-logo"><i class='bx bx-store'></i></div>
                <div class="store-info">
                    <h1 id="store-name">Loading Store...</h1>
                    <p>Welcome to our official digital storefront</p>
                </div>
            </div>
        </header>
        
        <main class="store-main">
            <div class="search-bar-container">
                <div class="search-bar">
                    <i class='bx bx-search'></i>
                    <input type="text" id="search-input" placeholder="Search for products...">
                </div>
            </div>
            
            <div class="products-grid" id="products-grid">
                <!-- Products via JS -->
            </div>
            
            <div id="no-products" style="display:none; text-align:center; padding: 40px; color: var(--text-muted);">
                <i class='bx bx-box' style="font-size: 48px; margin-bottom: 16px; opacity:0.5;"></i>
                <h2>No products found</h2>
                <p>Try adjusting your search</p>
            </div>
            
            <div id="loading-spinner" style="text-align:center; padding: 60px;">
                <div class="spinner"></div>
                <p style="margin-top: 16px; color: var(--text-muted); font-weight: 500;">Loading Products...</p>
            </div>
        </main>
        
        <footer class="store-footer">
            <p>Powered by <strong>Shamod POS</strong> Marketplace</p>
        </footer>
    </div>
    <script src="/marketplace.js"></script>
</body>
</html>
